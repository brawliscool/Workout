<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#091522"><title>CalmLift</title><style>:root{--bg:#091522;--p:#15263a;--p2:#1b2e45;--l:#2a4058;--t:#f7f9fc;--m:#9eb0c4;--b:#4c97ff}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%,#1b324c,#091522 42%,#07111b);color:var(--t);font:14px system-ui,-apple-system,sans-serif}.app{max-width:560px;margin:auto;padding:calc(22px + env(safe-area-inset-top)) 18px calc(110px + env(safe-area-inset-bottom))}button,input,textarea,select{font:inherit}button{cursor:pointer}header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}.hello{color:var(--b);font-size:22px;font-weight:750}h1{font-size:38px;line-height:1;margin:5px 0 10px}header p{margin:0;color:var(--m);font-size:17px}.profile{width:52px;height:52px;border-radius:50%;border:1px solid #4a6178;background:transparent;color:#dbe7f2;font-size:22px}.page{display:none}.page.on{display:block}.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card,.item,.action{background:linear-gradient(145deg,var(--p2),var(--p));border:1px solid var(--l);box-shadow:0 18px 45px #0005}.card{border-radius:20px}.stat{padding:20px;min-height:178px}.stathead{display:flex;justify-content:space-between;align-items:center;color:#cad6e2}.icon{width:44px;height:44px;border-radius:14px;background:#233e5d;display:grid;place-items:center;color:var(--b);font-size:20px}.value{font-size:42px;font-weight:800;color:var(--b);margin:16px 0 7px}.value small{font-size:14px}.muted{color:var(--m)}.dots{display:flex;gap:11px;margin-top:18px}.dots i{width:11px;height:11px;border-radius:50%;background:#5c7188}.dots i.on{background:var(--b)}.section{display:flex;align-items:center;justify-content:space-between;margin:30px 0 14px}.section h2{font-size:24px;margin:0}.link{border:0;background:0;color:var(--b);font-size:16px}.workout{padding:22px}.worktop{display:flex;align-items:center;gap:16px}.bodyicon{width:72px;height:72px;border-radius:16px;background:#24466c;display:grid;place-items:center;font-size:33px}.wtitle{font-size:23px;font-weight:750}.wdate{color:var(--m);margin-top:5px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);margin-top:19px}.metric{text-align:center;border-left:1px solid var(--l)}.metric:first-child{border:0}.metric b{font-size:20px}.metric span{display:block;color:var(--m);font-size:12px;margin-top:4px}.chart{padding:16px}canvas{display:block;width:100%;height:235px}.range{border:0;background:#22364e;color:#eaf3fb;border-radius:12px;padding:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:14px}.action{border-radius:18px;color:var(--t);padding:17px;text-align:left;display:flex;align-items:center;gap:13px}.action .aicon{width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#5da8ff,#2d7be5);display:grid;place-items:center;font-size:29px;flex:none}.action .square{border-radius:15px;background:#243f5f;color:var(--b)}.action b{display:block;font-size:16px}.action small{display:block;color:var(--m);margin-top:4px}.list{display:grid;gap:10px}.item{border-radius:17px;padding:14px;display:flex;align-items:center;gap:12px}.iicon{width:44px;height:44px;border-radius:13px;background:#243f5f;color:var(--b);display:grid;place-items:center;flex:none}.imain{flex:1;min-width:0}.ititle{font-weight:750;font-size:16px}.isub{font-size:12px;color:var(--m);margin-top:4px}.del{border:0;background:0;color:#8195aa;font-size:19px}.empty{padding:25px;text-align:center;color:var(--m);border:1px dashed #40566d;border-radius:18px}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(560px,100%);padding:10px 18px calc(12px + env(safe-area-inset-bottom));background:#08121dea;backdrop-filter:blur(18px);border-top:1px solid #203449}.navin{display:grid;grid-template-columns:repeat(4,1fr)}.nav button{border:0;background:0;color:#90a2b6;padding:7px 2px;font-size:11px}.nav span{display:block;font-size:22px;margin-bottom:3px}.nav button.on{color:var(--b)}.modal{display:none;position:fixed;inset:0;background:#0009;z-index:5;align-items:flex-end;padding:14px}.modal.on{display:flex}.sheet{width:min(560px,100%);margin:auto;max-height:92vh;overflow:auto;background:#0f1d2c;border:1px solid var(--l);border-radius:28px 28px 18px 18px;padding:20px}.sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.sheethead h3{font-size:22px;margin:0}.close{width:40px;height:40px;border:0;border-radius:13px;background:#1b2d42;color:#d6e2ed}.field{margin-bottom:14px}label{display:block;color:var(--m);font-size:12px;margin-bottom:7px}input,textarea{width:100%;border:1px solid #2d435b;background:#132438;color:#fff;border-radius:14px;padding:13px;outline:0}textarea{min-height:80px}.row{display:grid;grid-template-columns:1fr 1fr;gap:11px}.ex{display:grid;grid-template-columns:1.35fr .65fr .65fr 40px;gap:7px;margin-bottom:8px}.primary,.secondary{width:100%;border-radius:14px;padding:13px;font-weight:750}.primary{border:0;background:linear-gradient(145deg,#5ba5ff,#2c7be5);color:#fff}.secondary{border:1px solid #2d435b;background:#16293e;color:#d8e5f2}.remove{border:0;border-radius:12px;background:#3b2630;color:#ff7b7b}.toast{position:fixed;left:50%;bottom:105px;transform:translate(-50%,15px);background:#eef6fd;color:#142536;padding:10px 14px;border-radius:13px;opacity:0;transition:.2s;z-index:8}.toast.on{opacity:1;transform:translate(-50%,0)}@media(max-width:390px){.stats,.actions{grid-template-columns:1fr}.ex{grid-template-columns:1.15fr .6fr .6fr 37px}}</style></head><body><div class="app"><header><div><div class="hello">Good morning,</div><h1>Justin</h1><p>Stay consistent. See results.</p></div><button class="profile" onclick="openM('settings')">♙</button></header><main><section id="home" class="page on"><div class="stats"><div class="card stat"><div class="stathead"><span>Body Weight</span><div class="icon">▣</div></div><div class="value"><span id="cw">—</span> <small>lb</small></div><div id="change" class="muted">No entries yet</div></div><div class="card stat"><div class="stathead"><span>Workouts This Week</span><div class="icon">🏋</div></div><div class="value" id="week">0</div><div class="muted">of 5 goal</div><div class="dots" id="dots"></div></div></div><div class="section"><h2>Recent Workout</h2><button class="link" onclick="page('workouts')">View all</button></div><div id="recent"></div><div class="section"><h2>Body Weight Progress</h2><select class="range" onchange="days=+this.value;draw()"><option value="30">30 Days</option><option value="90">90 Days</option><option value="3650">All</option></select></div><div class="card chart"><canvas id="chart"></canvas></div><div class="section"><h2>Quick Actions</h2></div><div class="actions"><button class="action" onclick="workoutM()"><div class="aicon">＋</div><div><b>Log Workout</b><small>Track your workout</small></div></button><button class="action" onclick="weightM()"><div class="aicon square">▣</div><div><b>Log Body Weight</b><small>Update your weight</small></div></button></div></section><section id="workouts" class="page"><div class="section" style="margin-top:0"><h2>Workouts</h2><button class="link" onclick="workoutM()">+ Add</button></div><div id="workoutList" class="list"></div></section><section id="progress" class="page"><div class="section" style="margin-top:0"><h2>Progress</h2><button class="link" onclick="weightM()">+ Log</button></div><div class="card chart"><canvas id="chart2"></canvas></div><div class="section"><h2>Weight History</h2></div><div id="weightList" class="list"></div></section><section id="history" class="page"><div class="section" style="margin-top:0"><h2>Activity</h2></div><div id="historyList" class="list"></div></section></main></div><nav class="nav"><div class="navin"><button class="on" data-p="home" onclick="page('home')"><span>⌂</span>Dashboard</button><button data-p="workouts" onclick="page('workouts')"><span>🏋</span>Workouts</button><button data-p="progress" onclick="page('progress')"><span>⌁</span>Progress</button><button data-p="history" onclick="page('history')"><span>•••</span>More</button></div></nav><div id="workout" class="modal"><div class="sheet"><div class="sheethead"><h3>Log Workout</h3><button class="close" onclick="closeM('workout')">✕</button></div><div class="row"><div class="field"><label>Date</label><input type="date" id="wd"></div><div class="field"><label>Workout name</label><input id="wn" placeholder="Push Day"></div></div><div class="field"><label>Exercises</label><div id="exs"></div><button class="secondary" onclick="addEx()">+ Add exercise</button></div><div class="field"><label>Notes</label><textarea id="notes"></textarea></div><button class="primary" onclick="saveWorkout()">Save Workout</button></div></div><div id="weight" class="modal"><div class="sheet"><div class="sheethead"><h3>Log Body Weight</h3><button class="close" onclick="closeM('weight')">✕</button></div><div class="row"><div class="field"><label>Date</label><input type="date" id="bd"></div><div class="field"><label>Weight (lb)</label><input type="number" step=".1" id="bv"></div></div><div class="field"><label>Note</label><input id="bn" placeholder="Morning weigh-in"></div><button class="primary" onclick="saveWeight()">Save Weight</button></div></div><div id="settings" class="modal"><div class="sheet"><div class="sheethead"><h3>Settings</h3><button class="close" onclick="closeM('settings')">✕</button></div><div class="field"><label>Goal weight (lb)</label><input type="number" step=".1" id="goal"></div><button class="primary" onclick="saveGoal()">Save Settings</button><br><br><button class="secondary" onclick="exportData()">Export Backup</button><br><br><input type="file" accept="application/json" onchange="importData(event)"><br><br><button class="secondary" onclick="clearData()">Clear All Data</button></div></div><div class="toast" id="toast"></div><script>const K='calmlift-data-v1';let d=JSON.parse(localStorage.getItem(K)||'null')||{workouts:[],weights:[],settings:{goalWeight:120}},days=30;const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],today=()=>new Date().toISOString().slice(0,10),fmt=x=>new Date(x+'T12:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}),uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+'';function save(){localStorage.setItem(K,JSON.stringify(d));render()}function msg(x){let t=$('#toast');t.textContent=x;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1700)}function esc(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function page(x){$$('.page').forEach(e=>e.classList.toggle('on',e.id==x));$$('.nav button').forEach(e=>e.classList.toggle('on',e.dataset.p==x));scrollTo(0,0);setTimeout(draw,30)}function openM(x){$('#'+x).classList.add('on');if(x=='settings')$('#goal').value=d.settings.goalWeight||''}function closeM(x){$('#'+x).classList.remove('on')}function workoutM(){$('#wd').value=today();$('#wn').value='';$('#notes').value='';$('#exs').innerHTML='';addEx();openM('workout')}function weightM(){$('#bd').value=today();$('#bv').value='';$('#bn').value='';openM('weight')}function addEx(){let r=document.createElement('div');r.className='ex';r.innerHTML='<input class="en" placeholder="Exercise"><input class="es" type="number" placeholder="Sets"><input class="er" placeholder="Reps"><button class="remove" onclick="this.parentElement.remove()">×</button>';$('#exs').append(r)}function saveWorkout(){let name=$('#wn').value.trim(),date=$('#wd').value,ex=$$('.ex').map(r=>({name:r.querySelector('.en').value.trim(),sets:+r.querySelector('.es').value||0,reps:r.querySelector('.er').value.trim()})).filter(x=>x.name);if(!name||!date||!ex.length)return msg('Add a name and exercise');d.workouts.push({id:uid(),date,name,exercises:ex,notes:$('#notes').value,created:Date.now()});save();closeM('workout');msg('Workout saved')}function saveWeight(){let date=$('#bd').value,w=+$('#bv').value;if(!date||!w)return msg('Enter a valid weight');let x=d.weights.find(x=>x.date==date);x?Object.assign(x,{weight:w,note:$('#bn').value}):d.weights.push({id:uid(),date,weight:w,note:$('#bn').value,created:Date.now()});save();closeM('weight');msg('Weight saved')}function saveGoal(){d.settings.goalWeight=+$('#goal').value||null;save();closeM('settings');msg('Settings saved')}function delW(id){if(confirm('Delete workout?')){d.workouts=d.workouts.filter(x=>x.id!=id);save()}}function delB(id){if(confirm('Delete entry?')){d.weights=d.weights.filter(x=>x.id!=id);save()}}function wh(w){let sets=w.exercises.reduce((a,e)=>a+(e.sets||0),0);return `<div class="item"><div class="iicon">🏋</div><div class="imain"><div class="ititle">${esc(w.name)}</div><div class="isub">${fmt(w.date)} · ${w.exercises.length} exercises · ${sets} sets</div></div><button class="del" onclick="delW('${w.id}')">×</button></div>`}function bh(w){return `<div class="item"><div class="iicon">▣</div><div class="imain"><div class="ititle">${fmt(w.date)}</div><div class="isub">${esc(w.note||'Body-weight entry')}</div></div><b>${w.weight.toFixed(1)} lb</b><button class="del" onclick="delB('${w.id}')">×</button></div>`}function recent(ws){if(!ws.length){$('#recent').innerHTML='<div class="empty">No workouts logged yet.</div>';return}let w=ws[0],sets=w.exercises.reduce((a,e)=>a+(e.sets||0),0),reps=w.exercises.reduce((a,e)=>a+(e.sets||0)*(parseFloat(e.reps)||0),0);$('#recent').innerHTML=`<div class="card workout"><div class="worktop"><div class="bodyicon">🏋</div><div><div class="wtitle">${esc(w.name)}</div><div class="wdate">${fmt(w.date)}</div></div></div><div class="metrics"><div class="metric"><b>${w.exercises.length}</b><span>Exercises</span></div><div class="metric"><b>${sets}</b><span>Sets</span></div><div class="metric"><b>${reps}</b><span>Total Reps</span></div></div></div>`}function render(){let ws=[...d.workouts].sort((a,b)=>b.date.localeCompare(a.date)),bs=[...d.weights].sort((a,b)=>a.date.localeCompare(b.date)),last=bs.at(-1),first=bs[0];$('#cw').textContent=last?last.weight.toFixed(1):'—';$('#change').textContent=last&&bs.length>1?`${last.weight-first.weight>=0?'↑':'↓'} ${Math.abs(last.weight-first.weight).toFixed(1)} lb overall`:'No entries yet';let ago=new Date;ago.setDate(ago.getDate()-6);let wk=ws.filter(w=>new Date(w.date+'T12:00')>=ago).length;$('#week').textContent=wk;$('#dots').innerHTML=Array.from({length:5},(_,i)=>`<i class="${i<wk?'on':''}"></i>`).join('');recent(ws);$('#workoutList').innerHTML=ws.length?ws.map(wh).join(''):'<div class="empty">No workouts logged yet.</div>';$('#weightList').innerHTML=bs.length?[...bs].reverse().map(bh).join(''):'<div class="empty">No weight entries yet.</div>';let all=[...ws.map(x=>({...x,type:'w'})),...bs.map(x=>({...x,type:'b'}))].sort((a,b)=>b.date.localeCompare(a.date));$('#historyList').innerHTML=all.length?all.map(x=>x.type=='w'?wh(x):bh(x)).join(''):'<div class="empty">Nothing logged yet.</div>';draw()}function plot(c){if(!c)return;let r=c.getBoundingClientRect();if(!r.width)return;let z=devicePixelRatio||1;c.width=r.width*z;c.height=235*z;let q=c.getContext('2d');q.scale(z,z);q.clearRect(0,0,r.width,235);let cut=new Date;cut.setDate(cut.getDate()-days);let a=[...d.weights].sort((x,y)=>x.date.localeCompare(y.date)).filter(x=>new Date(x.date+'T12:00')>=cut);q.font='11px system-ui';if(a.length<2){q.fillStyle='#9eb0c4';q.textAlign='center';q.fillText('Log at least two weight entries to see your trend',r.width/2,118);return}let vs=a.map(x=>x.weight),mi=Math.floor(Math.min(...vs)-2),ma=Math.ceil(Math.max(...vs)+2),X=i=>38+(r.width-54)*i/(a.length-1),Y=v=>16+(ma-v)/(ma-mi)*185;q.strokeStyle='#263b52';for(let i=0;i<5;i++){let y=16+i*46;q.beginPath();q.moveTo(38,y);q.lineTo(r.width-16,y);q.stroke()}q.beginPath();a.forEach((x,i)=>i?q.lineTo(X(i),Y(x.weight)):q.moveTo(X(i),Y(x.weight)));q.strokeStyle='#4c97ff';q.lineWidth=3;q.stroke();a.forEach((x,i)=>{q.beginPath();q.arc(X(i),Y(x.weight),i==a.length-1?5:2.5,0,7);q.fillStyle=i==a.length-1?'#dcecff':'#4c97ff';q.fill()})}function draw(){plot($('#chart'));plot($('#chart2'))}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download='calmlift-backup.json';a.click()}function importData(e){let f=e.target.files[0],r=new FileReader;r.onload=()=>{try{d=JSON.parse(r.result);save();msg('Backup imported')}catch{msg('Invalid file')}};f&&r.readAsText(f)}function clearData(){if(confirm('Delete all app data?')){d={workouts:[],weights:[],settings:{goalWeight:120}};save();closeM('settings')}}addEventListener('resize',draw);render();</script></body></html>
